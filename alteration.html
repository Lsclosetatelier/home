<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L’s Closet Atelier – Alteration Request Form</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:wght@300;400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-color:#000; --secondary-color:#fff; --max-width:900px; }
    body {
      margin: 0;
      font-family: 'Lora', serif;
      color: var(--primary-color);
      background-color: #fdfdfd;
      line-height: 1.6;
    }
    /* Nav */
    .top-nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:var(--secondary-color);
      border-bottom:1px solid #ddd;
      padding:0.5rem 1rem;
      position:sticky;
      top:0;
      z-index:100;
    }
    .top-nav .nav-left,
    .top-nav .nav-right { display:flex; gap:1rem; align-items:center; flex:1; }
    .icon { display:flex; align-items:center; gap:0.4rem; cursor:pointer; }
    .top-nav svg { width:1.4rem; height:1.4rem; fill:currentColor; }
    .nav-center {
      font-family:'DM Serif Display', serif;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:1rem;
      color:var(--primary-color);
      flex:1;
      text-align:center;
      white-space:nowrap;
    }
    .menu-label {
      font-size:0.8rem;
      letter-spacing:1px;
      text-transform:uppercase;
      font-weight:600;
      font-family:'Work Sans', sans-serif;
    }
    /* Mobile menu overlay */
    .mobile-menu {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:80%;
      max-width:320px;
      height:100vh;
      background:var(--secondary-color);
      color:var(--primary-color);
      flex-direction:column;
      align-items:flex-start;
      padding:2rem;
      gap:1rem;
      box-shadow:2px 0 8px rgba(0,0,0,0.2);
      z-index:999;
    }
    .mobile-menu a {
      text-decoration:none;
      color:var(--primary-color);
      font-size:1.1rem;
      letter-spacing:1px;
      font-family:'Work Sans', sans-serif;
      text-transform:uppercase;
      display:flex;
      justify-content:space-between;
      align-items:center;
      width:100%;
    }
    .mobile-menu a::after { content:""; font-size:1.1rem; line-height:1; }
    #menu-toggle:checked + .mobile-menu { display:flex; }
    .menu-close { align-self:flex-end; cursor:pointer; margin-bottom:1rem; }
    .menu-close svg { width:1.5rem; height:1.5rem; fill:currentColor; }

    /* Form wrapper */
    section {
      padding:3rem 1rem;
      max-width:var(--max-width);
      margin:2rem auto;
    }
    form {
      background:#fff;
      padding:2rem;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .field { margin-bottom:1rem; }
    label { display:block; margin-bottom:0.4rem; font-weight:600; }
    input, select, textarea {
      width:100%;
      padding:0.6rem;
      border:1px solid #ccc;
      border-radius:4px;
      font-family:'Lora', serif;
      font-size:1rem;
      box-sizing:border-box;
    }
    input[type="checkbox"], input[type="radio"] {
      width:auto;
      margin-right:0.5rem;
    }
    .checkbox-group, .radio-group { margin-bottom:1rem; }
    .checkbox-group label, .radio-group label {
      font-weight:normal; margin-right:1rem;
      display:inline-flex; align-items:center;
    }
    button {
      background:var(--primary-color);
      color:var(--secondary-color);
      border:none;
      padding:0.8rem 2rem;
      font-size:1rem;
      border-radius:4px;
      cursor:pointer;
      transition:background 0.3s;
    }
    button:hover { background:#333; }
    @media (max-width:600px) {
      .nav-center { font-size:0.8rem; letter-spacing:1px; }
      form { padding:1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <label for="menu-toggle" class="icon" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
        </svg>
        <span class="menu-label">Menu</span>
      </label>
    </div>
    <div class="nav-center">L’s Closet Atelier</div>
    <div class="nav-right"></div>
  </nav>

  <input type="checkbox" id="menu-toggle" hidden>
  <div class="mobile-menu">
    <label for="menu-toggle" class="menu-close" aria-label="Close menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2.146 2.146a.5.5 0 0 1 .708 0L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854a.5.5 0 0 1 0-.708z"/>
      </svg>
    </label>
    <a href="index.html">Home</a>
    <a href="alteration.html">Alteration Requests</a>
    <a href="costume.html">Couture Costume Requests</a>
  </div>

  <section>
    <form name="alteration-request"
          method="POST"
          data-netlify="true"
          data-netlify-honeypot="bot-field"
          enctype="multipart/form-data">

      <!-- Required hidden fields for Netlify -->
      <input type="hidden" name="form-name" value="alteration-request">
      <input type="hidden" name="bot-field">

      <h2>Alteration Request Form</h2>
      <p>Please complete this form to request tailoring or alterations.</p>

      <div class="field">
        <label for="name">Full Name*</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="field">
        <label for="email">Email Address*</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="field">
        <label for="phone">Phone Number*</label>
        <input type="tel" id="phone" name="phone" required>
      </div>

      <div class="field">
        <label>Preferred Contact Method*</label>
        <div class="radio-group">
          <label><input type="radio" name="contact_method" value="Email" required> Email</label>
          <label><input type="radio" name="contact_method" value="Phone"> Phone</label>
          <label><input type="radio" name="contact_method" value="Text"> Text</label>
        </div>
      </div>

      <div class="field">
        <label for="garment_type">Type of Garment*</label>
        <select id="garment_type" name="garment_type" required>
          <option value="">Select garment</option>
          <option value="Wedding Dress">Wedding Dress</option>
          <option value="Suit">Suit</option>
          <option value="Pants">Pants</option>
          <option value="Dress">Dress</option>
          <option value="Skirt">Skirt</option>
          <option value="Blouse">Blouse</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field">
        <label>Alteration Type (select all that apply)*</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="alteration_type[]" value="Hemming"> Hemming</label>
          <label><input type="checkbox" name="alteration_type[]" value="Taking in/Letting out"> Taking in/Letting out</label>
          <label><input type="checkbox" name="alteration_type[]" value="Sleeve adjustments"> Sleeve adjustments</label>
          <label><input type="checkbox" name="alteration_type[]" value="Waist/Hip adjustments"> Waist/Hip adjustments</label>
          <label><input type="checkbox" name="alteration_type[]" value="Shoulder adjustments"> Shoulder adjustments</label>
          <label><input type="checkbox" name="alteration_type[]" value="Bust adjustments"> Bust adjustments</label>
          <label><input type="checkbox" name="alteration_type[]" value="Repairs"> Repairs</label>
          <label><input type="checkbox" name="alteration_type[]" value="Other"> Other</label>
        </div>
      </div>

      <div class="field">
        <label for="quantity">Quantity of Items*</label>
        <input type="number" id="quantity" name="quantity" min="1" required>
      </div>

      <div class="field">
        <label for="deadline_needed">Do you need the items by a certain date?</label>
        <input type="date" id="deadline_needed" name="deadline_needed">
      </div>

      <div class="field">
        <label for="event_date">Event Date (Wedding or Special Event)</label>
        <input type="date" id="event_date" name="event_date">
      </div>

      <div class="field">
        <label for="details">Alteration Details / Additional Information*</label>
        <textarea id="details" name="details" rows="4" required></textarea>
      </div>

      <div class="field">
        <label for="photo">Upload Photo of Garment*</label>
        <input type="file" id="photo" name="photo" accept="image/*" required>
      </div>

      <div class="field">
        <label for="referral">How did you hear about us?</label>
        <select id="referral" name="referral">
          <option value="">Select</option>
          <option value="Social Media">Social Media</option>
          <option value="Friend or Family">Friend or Family</option>
          <option value="Advertisement">Advertisement</option>
          <option value="Search Engine">Search Engine</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" name="consent" required>
          I acknowledge the cancellation fee*
        </label>
      </div>

      <button type="submit">Submit</button>
    </form>
  </section>
</body>
</html>
