<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L’s Closet Atelier</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:wght@300;400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #000;
      --secondary-color: #fff;
      --accent-color: #d4af37;
      --max-width: 900px;
    }
    body {
      margin: 0;
      font-family: 'Lora', serif;
      color: var(--primary-color);
      background-color: #fdfdfd;
      line-height: 1.6;
    }
    /* Base styling for hero sections */
    .hero {
      background-size: cover;
      background-position: center;
      height: 60vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      color: var(--secondary-color);
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
    }
    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 18%;
      pointer-events: none;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0));
      z-index: 1;
    }
    .hero-one { background-image: url('Caver-21.jpeg'); }
    .hero-two { background-image: url('NakupendaPhotography-18.jpeg'); }
    .link-options {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 500px;
      z-index: 2;
    }
    .service-link {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: var(--secondary-color);
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      text-decoration: none;
      border: none;
      border-radius: 0;
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }
    .service-link:hover {
      background: var(--primary-color);
      color: var(--secondary-color);
    }
    /* Top navigation */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--secondary-color);
      border-bottom: 1px solid #ddd;
      padding: 0.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-nav .nav-left,
    .top-nav .nav-right {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex: 1;
    }
    .top-nav .icon {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }
    .top-nav svg {
      width: 1.4rem;
      height: 1.4rem;
      fill: currentColor;
    }
    .top-nav .nav-center {
      font-family: 'DM Serif Display', serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1rem;
      color: var(--primary-color);
      flex: 1;
      text-align: center;
      white-space: nowrap;
    }
    .menu-label {
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
      font-family: 'Work Sans', sans-serif;
    }
    /* Mobile menu overlay */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: var(--secondary-color);
      color: var(--primary-color);
      flex-direction: column;
      align-items: flex-start;
      padding: 2rem;
      gap: 1rem;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
      z-index: 999;
    }
    .mobile-menu a {
      text-decoration: none;
      color: var(--primary-color);
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-family: 'Work Sans', sans-serif;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .mobile-menu a::after {
      content: "";
      font-size: 1.1rem;
      line-height: 1;
    }
    #menu-toggle:checked + .mobile-menu {
      display: flex;
    }
    .menu-close {
      align-self: flex-end;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    .menu-close svg {
      width: 1.5rem;
      height: 1.5rem;
      fill: currentColor;
    }
    @media (max-width: 600px) {
      .top-nav .nav-center { font-size: 0.8rem; letter-spacing: 1px; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <label for="menu-toggle" class="icon" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
        </svg>
        <span class="menu-label">Menu</span>
      </label>
    </div>
    <div class="nav-center">L’s Closet Atelier</div>
    <div class="nav-right"></div>
  </nav>
  <input type="checkbox" id="menu-toggle" hidden>
  <div class="mobile-menu">
    <label for="menu-toggle" class="menu-close" aria-label="Close menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2.146 2.146a.5.5 0 0 1 .708 0L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854a.5.5 0 0 1 0-.708z"/>
      </svg>
    </label>
    <a href="index.html">Home</a>
    <a href="alteration.html">Alteration Requests</a>
    <a href="costume.html">Couture Costume Requests</a>
  </div>
  <!-- First hero -->
  <section class="hero hero-one">
    <div class="link-options">
      <a href="alteration.html" class="service-link">Alteration Requests</a>
    </div>
  </section>
  <!-- Second hero -->
  <section class="hero hero-two">
    <div class="link-options">
      <a href="costume.html" class="service-link">Couture Costume Requests</a>
    </div>
  </section>
</body>
</html>
