  <!-- Icons are embedded inline in the navigation bar; no external icon font is needed -->
  <style>
    :root {
      --primary-color: #000;
      --secondary-color: #fff;
      --accent-color: #d4af37; /* subtle gold tone */
      --max-width: 900px;
    }

    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      color: var(--primary-color);
      background-color: #fdfdfd;
      line-height: 1.6;
    }

    /* Hero section uses a dark, abstract image reminiscent of couture branding */
    header {
      background-image: url('9e0e5d93-2aca-4056-9c12-88983c04c751.png');
      background-size: cover;
      background-position: center;
      height: 60vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--secondary-color);
    }

    header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
    }

    header .inner {
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin: 0;
      letter-spacing: 1px;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      font-weight: 300;
    }

    section {
      padding: 2rem 1rem;
      max-width: var(--max-width);
      margin: -4rem auto 2rem; /* pull the form up slightly into the hero section */
    }

    form {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    form .field {
      margin-bottom: 1rem;
    }

    form label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      box-sizing: border-box;
    }

    form input[type="checkbox"],
    form input[type="radio"] {
      width: auto;
      margin-right: 0.5rem;
    }

    .checkbox-group,
    .radio-group {
      margin-bottom: 1rem;
    }

    .checkbox-group label,
    .radio-group label {
      font-weight: normal;
      margin-right: 1rem;
      display: inline-flex;
      align-items: center;
    }

    button {
      background: var(--primary-color);
      color: var(--secondary-color);
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #333;
    }

    /* Top navigation bar inspired by Chanel.com */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--secondary-color);
      border-bottom: 1px solid #ddd;
      padding: 0.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-nav .nav-left,
    .top-nav .nav-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .top-nav a {
      color: var(--primary-color);
      text-decoration: none;
      /* Icons within the nav inherit currentColor; size is defined via SVG attributes */
      font-size: 1rem;
      display: flex;
      align-items: center;
    }

    .top-nav svg {
      width: 1.4rem;
      height: 1.4rem;
      fill: currentColor;
    }

    .top-nav .nav-center {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1rem;
      color: var(--primary-color);
    }

    @media (max-width: 600px) {
      .top-nav a {
        font-size: 1.2rem;
      }
      .top-nav .nav-center {
        font-size: 0.8rem;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }
      form {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Top navigation bar with menu and icons -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="#" class="icon" aria-label="Menu">
        <!-- Hamburger (list) icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </a>
      <a href="#" class="icon" aria-label="Search">
        <!-- Search icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>
      </a>
    </div>
    <div class="nav-center">L’s Closet Atelier</div>
    <div class="nav-right">
      <a href="#" class="icon" aria-label="Account">
        <!-- Person icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
        </svg>

      <a href="#" class="icon" aria-label="Bag">
        <!-- Bag icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
        </svg>
      </a>
    </div>
  </nav>
  <header>
    <div class="inner">
      <h1>L’s Closet Atelier</h1>
      <p>Tailoring &amp; Alterations</p>
    </div>
  </header>

  <section>
    <!-- The booking form captures key details recommended by industry templates. -->
    <!-- Replace the mailto URL with your preferred email address -->
    <form action="mailto:lsclosetatelier@example.com" method="POST" enctype="multipart/form-data">
      <!-- Contact Information -->
      <div class="field">
        <label for="name">Full Name*</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="field">
        <label for="email">Email Address*</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="phone">Phone Number*</label>
        <input type="tel" id="phone" name="phone" required>
      </div>
      <div class="field">
        <label>Preferred Contact Method*</label>
        <div class="radio-group">
          <label><input type="radio" name="contact_method" value="Email" required> Email</label>
          <label><input type="radio" name="contact_method" value="Phone"> Phone</label>
          <label><input type="radio" name="contact_method" value="Text"> Text</label>
        </div>
      </div>

      <!-- Appointment Scheduling removed per user request -->

      <!-- Garment and Alteration Details -->
      <div class="field">
        <label for="garment_type">Type of Garment*</label>
        <select id="garment_type" name="garment_type" required>
          <option value="">Select garment</option>
          <option value="Wedding Dress">Wedding Dress</option>
          <option value="Suit">Suit</option>
          <option value="Pants">Pants</option>
          <option value="Dress">Dress</option>
          <option value="Skirt">Skirt</option>
          <option value="Blouse">Blouse</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Alteration Type (select all that apply)*</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="alteration_type" value="Hemming"> Hemming</label>
          <label><input type="checkbox" name="alteration_type" value="Taking in/Letting out"> Taking&nbsp;in/Letting&nbsp;out</label>
          <label><input type="checkbox" name="alteration_type" value="Sleeve adjustments"> Sleeve adjustments</label>
          <label><input type="checkbox" name="alteration_type" value="Waist/Hip adjustments"> Waist/Hip adjustments</label>
          <label><input type="checkbox" name="alteration_type" value="Shoulder adjustments"> Shoulder adjustments</label>
          <label><input type="checkbox" name="alteration_type" value="Bust adjustments"> Bust adjustments</label>
          <label><input type="checkbox" name="alteration_type" value="Repairs"> Repairs</label>
          <label><input type="checkbox" name="alteration_type" value="Other"> Other</label>
        </div>
      </div>
      <div class="field">
        <label for="quantity">Quantity of Items*</label>
        <input type="number" id="quantity" name="quantity" min="1" required>
      </div>
      <div class="field">
        <label for="deadline_needed">Do you need the items by a certain date?</label>
        <input type="date" id="deadline_needed" name="deadline_needed">
      </div>
      <div class="field">
        <label for="event_date">Event Date (Wedding or Special Event)</label>
        <input type="date" id="event_date" name="event_date">
      </div>
      <div class="field">
        <label for="details">Alteration Details / Additional Information*</label>
        <textarea id="details" name="details" rows="4" required></textarea>
      </div>
      <div class="field">
        <label for="photo">Upload Photo of Garment</label>
        <input type="file" id="photo" name="photo" accept="image/*">
      </div>
      <div class="field">
        <label for="referral">How did you hear about us?</label>
        <select id="referral" name="referral">
          <option value="">Select</option>
          <option value="Social Media">Social Media</option>
          <option value="Friend or Family">Friend or Family</option>
          <option value="Advertisement">Advertisement</option>
          <option value="Search Engine">Search Engine</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label><input type="checkbox" name="consent" required> I acknowledge the cancellation</label>
      </div>
      <button type="submit">Submit</button>
    </form>
  </section>

</body>
